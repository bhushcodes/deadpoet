<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Navbar with Hamburger</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Bubbler+One&family=Caveat:wght@400..700&family=Comforter+Brush&family=Crafty+Girls&family=Gloria+Hallelujah&family=Leckerli+One&family=Playwrite+HU:wght@100..400&family=Princess+Sofia&family=WindSong:wght@400;500&display=swap" rel="stylesheet">

    <!-- CSS Styles -->
    <style>
        /* General reset and body styling */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            margin: 0;
        }

        /* Header Styling */
        header {
            background-color: #84a98c;
            padding: 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav {
            display: flex;
            justify-content: space-between;
            width: 100%;
        }

        /* Logo */
        .logo h1 {
            color: white;
            font-size: 1.8em;
            padding-left: 20px;
            font-family: "Crafty Girls", cursive;
            font-weight: 400;
            font-style: normal;
            text-shadow: 1.8px 1.8px black;
        }

        /* Hamburger Menu Icon */
        .menu-icon {
            display: none;
            cursor: pointer;
            width: 30px;
            height: 25px;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        .menu-icon .bar {
            width: 100%;
            height: 5px;
            background-color: white;
            border-radius: 5px;
        }

        /* Navbar Links */
        .navbar {
            list-style: none;
            display: flex;
            margin: 0;
            padding: 0;
        }

        .navbar li {
            margin: 0 20px;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-size: 18px;
            padding: 10px 20px;
            display: block;
            transition: 0.18s;
        }

        .navbar a:hover {
            color: #2f3e46;
            text-shadow: 0 0 30px white;
        }

        /* Side menu for mobile */
        .side-menu {
            position: fixed;
            top: 0;
            left: -250px; /* Initially hidden off-screen */
            height: 100%;
            width: 250px;
            background-color: #333;
            box-shadow: 2px 0 5px rgba(0, 0, 0, 0.5);
            transition: 0.3s ease;
        }

        .side-menu.active {
            left: 0; /* Slide the menu in when active */
        }

        .side-menu .navbar {
            list-style: none;
            display: flex;
            flex-direction: column;
            margin-top: 50px; /* Space for logo */
        }

        .side-menu .navbar li {
            margin: 20px 0;
        }

        .side-menu .navbar a {
            color: white;
            text-decoration: none;
            font-size: 18px;
            padding: 15px 20px;
            display: block;
            transition: background-color 0.3s;
        }

        .side-menu .navbar a:hover {
            background-color: #575757;
            border-radius: 5px;
        }

        /* Main content styling */
        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
            padding: 20px;
            background-color: #cad2c5;
        }

        /* Section styles to fill the screen */
        section {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        h1 {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.2em;
            color: #666;
        }

        /* Prevent page scroll on body */
        html, body {
            overflow: hidden;
        }

        /* Basic styling for the h1 */
        h1 {
            text-align: center;
            font-size: 3em;
            transition: font-family 0.18s ease-in-out; /* Smooth font transition */
        }

        /* -------- Responsive Design -------- */
        /* Mobile screens (up to 480px wide) */
        @media (max-width: 480px) {
            .navbar {
                display: none; /* Hide navbar links on mobile */
            }

            .menu-icon {
                display: flex; /* Show hamburger icon on mobile */
            }

            h1 {
                font-size: 2em;
            }

            p {
                font-size: 1em;
            }

            section {
                height: auto;
                padding: 15px;
            }
        }

        /* Tablet screens (481px to 768px wide) */
        @media (max-width: 768px) {
            .navbar {
                display: none; /* Hide navbar links on tablet */
            }

            .menu-icon {
                display: flex; /* Show hamburger icon on tablet */
            }

            h1 {
                font-size: 2.3em;
            }

            p {
                font-size: 1.1em;
            }

            section {
                height: auto;
                padding: 20px;
            }
        }

        /* Desktop screens (1025px and up) */
        @media (min-width: 1025px) {
            .navbar {
                display: flex;
                justify-content: center; /* Center navbar items */
            }

            .menu-icon {
                display: none; /* Hide hamburger icon on desktop */
            }

            h1 {
                font-size: 3em;
            }

            p {
                font-size: 1.4em;
            }

            section {
                height: 100vh;
            }
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <!-- Logo Section -->
            <div class="logo">
                <h1>Dead Poems</h1>
            </div>

            <!-- Hamburger Icon -->
            <div class="menu-icon" id="menu-icon">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>

            <!-- Navbar links -->
            <ul class="navbar" id="navbar">
                <li><a href="#blogs">Blogs</a></li>
                <li><a href="#poems">Poems</a></li>
                <li><a href="#books">Books</a></li>
                <li><a href="#about">About Me</a></li>
            </ul>

        </nav>
    </header>

    <main>
       <h1>Hello from dead poet...!</h1>
    </main>

    <!-- JavaScript -->
    <script>
        const menuIcon = document.getElementById('menu-icon');
        const sideMenu = document.createElement('div');
        sideMenu.classList.add('side-menu');
        sideMenu.innerHTML = `
          <ul class="navbar">
            <li><a href="#blogs">Blogs</a></li>
            <li><a href="#poems">Poems</a></li>
            <li><a href="#books">Books</a></li>
            <li><a href="#about">About Me</a></li>
          </ul>
        `;

        document.body.appendChild(sideMenu);

        // Toggle the sliding menu when the hamburger icon is clicked
        menuIcon.addEventListener('click', () => {
            sideMenu.classList.toggle('active');
        });

        // List of fonts from Google Fonts to cycle through
        const fonts = [
            'Bubbler One, cursive',
            'Caveat, cursive',
            'Comforter Brush, cursive',
            'Gloria Hallelujah, cursive',
            'Leckerli One, cursive',
            'Playwrite HU, cursive',
            'Princess Sofia, cursive',
            'WindSong, cursive'
        ];

        // Get the h1 element
        const h1Element = document.querySelector('main h1');

        // Function to change font every 0.18 seconds
        let currentIndex = 0;
        setInterval(() => {
            // Change the font of the h1 element
            h1Element.style.fontFamily = fonts[currentIndex];
            
            // Increment the index to use the next font in the array
            currentIndex = (currentIndex + 1) % fonts.length; // Loop back to the first font after the last one
        }, 500); // 500 milliseconds (0.5 seconds)
    </script>

</body>
</html>
